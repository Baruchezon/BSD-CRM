<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BSD CRM - קביעת סיסמה</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<style>
  .login-card button.pwd-toggle-btn{
    width:auto !important; height:auto !important; position:absolute; left:10px; top:50%;
    transform:translateY(-50%); background:none !important; border:none !important;
    box-shadow:none !important; cursor:pointer; font-size:1.1rem; padding:4px !important; line-height:1; min-height:0 !important;
  }
  .login-card button.pwd-toggle-btn:hover{ background:none !important; }
  #statusMsg{ text-align:center; color:#666; font-size:.85rem; margin-top:10px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <h1>BSD CRM</h1>
    <p class="tagline">ברוכים הבאים - בואו נקבע לך סיסמה אישית להתחברות</p>

    <form id="setPwdForm">
      <div style="position:relative;">
        <input type="password" id="password1" placeholder="סיסמה חדשה" required minlength="6" autocomplete="new-password" style="padding-left:40px;">
        <button type="button" id="togglePwd1" class="pwd-toggle-btn">👁️</button>
      </div>
      <div style="position:relative;margin-top:10px;">
        <input type="password" id="password2" placeholder="אימות סיסמה" required minlength="6" autocomplete="new-password" style="padding-left:40px;">
        <button type="button" id="togglePwd2" class="pwd-toggle-btn">👁️</button>
      </div>
      <button type="submit" id="submitBtn">קבע סיסמה והמשך</button>
    </form>
    <div id="statusMsg">טוען...</div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script>
const statusEl = document.getElementById('statusMsg');
const form = document.getElementById('setPwdForm');
form.style.display = 'none';

function togglePwdField(inputId, btnId){
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  btn.addEventListener('click', () => {
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁️' : '🙈';
  });
}
togglePwdField('password1','togglePwd1');
togglePwdField('password2','togglePwd2');

async function checkSession(){
  const { data: { session } } = await window.supabaseClient.auth.getSession();
  if (session){
    statusEl.textContent = '';
    form.style.display = 'block';
  } else {
    statusEl.textContent = 'הקישור לא תקין או שפג תוקפו. יש לבקש הזמנה חדשה מהמנהל.';
  }
}

// נותנים ל-supabase-js רגע לפענח את הטוקן מה-URL (detectSessionInUrl)
window.supabaseClient.auth.onAuthStateChange((event, session) => {
  if (session) { statusEl.textContent = ''; form.style.display = 'block'; }
});
setTimeout(checkSession, 400);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const p1 = document.getElementById('password1').value;
  const p2 = document.getElementById('password2').value;
  if (p1 !== p2){ statusEl.textContent = 'הסיסמאות אינן תואמות'; statusEl.style.color = '#b00'; return; }
  if (p1.length < 6){ statusEl.textContent = 'הסיסמה חייבת להכיל לפחות 6 תווים'; statusEl.style.color = '#b00'; return; }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'שומר...';

  const { error } = await window.supabaseClient.auth.updateUser({ password: p1 });
  if (error){
    statusEl.textContent = 'שגיאה: ' + error.message;
    statusEl.style.color = '#b00';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'קבע סיסמה והמשך';
    return;
  }
  statusEl.style.color = '#2e9e5b';
  statusEl.textContent = 'הסיסמה נקבעה בהצלחה! מעביר אותך למערכת...';
  setTimeout(() => { window.location.href = 'app.html'; }, 1200);
});
</script>
</body>
</html>
