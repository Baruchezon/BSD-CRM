<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BSD CRM - התאמות</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .wrap{padding:24px 28px 60px;max-width:1300px;margin:0 auto;}
  .nav a{color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;}
  .nav a.active{background:rgba(255,255,255,.12);color:#fff;font-weight:700;}
  .nav a:hover{color:#fff;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .toolbar h2{margin:0;color:var(--navy);font-size:1.3rem;}
  .btn{border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:.85rem;cursor:pointer;font-weight:700;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-ghost{background:#fff;border:1px solid #d8d3c4;color:var(--navy);}
  .btn-sm{padding:6px 12px;font-size:.78rem;}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters input, .filters select{padding:9px 12px;border:1px solid #d8d3c4;border-radius:8px;font-family:inherit;font-size:.85rem;}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.06);}
  thead th{background:var(--navy);color:#fff;padding:12px 14px;font-size:.8rem;text-align:right;white-space:nowrap;}
  tbody td{padding:11px 14px;border-bottom:1px solid #f0ede4;font-size:.85rem;}
  tbody tr:hover{background:#faf8f2;}
  .empty-row td{text-align:center;color:#999;padding:30px;}
  .status-pill{padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:700;background:#eef1f6;color:var(--navy);}
  .status-closed{background:#dff0e4;color:#245c40;}
  .status-stopped{background:#fbe4e0;color:#832d1f;}
  .status-negotiation{background:#fdeccb;color:#8a5a10;}
  .row-actions button{border:none;background:none;cursor:pointer;font-size:.9rem;padding:4px 6px;}

  .overlay{position:fixed;inset:0;background:rgba(14,27,52,.55);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;z-index:50;padding:40px 20px;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .modal h3{margin:0 0 18px;color:var(--navy);border-right:4px solid var(--gold);padding-right:10px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid .full{grid-column:1/3;}
  .field label{display:block;font-size:.78rem;color:#666;margin-bottom:4px;}
  .field input, .field select, .field textarea{width:100%;padding:9px 11px;border:1px solid #d8d3c4;border-radius:8px;font-family:inherit;font-size:.85rem;}
  .field textarea{resize:vertical;min-height:60px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .toast{position:fixed;bottom:24px;left:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:.85rem;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.3);}

  .thread{margin-top:16px;border-top:1px solid #eee;padding-top:14px;}
  .thread h4{font-size:.85rem;color:var(--navy);margin:0 0 10px;}
  .thread-item{display:flex;justify-content:space-between;font-size:.78rem;padding:6px 0;border-bottom:1px dashed #eee;}
  .participants{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .participant-chip{background:#eef1f6;padding:4px 10px;border-radius:12px;font-size:.75rem;}
</style>
</head>
<body>

<div class="bsd-header">
  <a href="app.html" style="text-decoration:none;color:inherit;"><div class="brand">BSD CRM <small>BSD Business Brokers Israel</small></div></a>
  <div id="headerUserInfo" style="color:var(--gold,#c9a24b);font-size:1rem;font-weight:700;white-space:nowrap;margin-inline-start:16px;align-self:center;"></div>
      <div class="nav" style="display:flex;gap:6px;">
    <a href="app.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">לוח בקרה</a>
    <a href="businesses.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">עסקים למכירה</a>
    <a href="leads.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">קונים ומשקיעים</a>
    <a href="matches.html" style="background:rgba(255,255,255,.12);color:#fff;font-weight:700;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">התאמות</a>
    <a href="tasks.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">משימות</a>
    <a href="users.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">משתמשים</a>
  </div>
  <button class="btn btn-ghost" onclick="bsdLogout()" style="color:#fff;border-color:rgba(255,255,255,.5);background:transparent;">יציאה</button>
</div>

<div class="wrap">
  <div class="toolbar">
    <h2>התאמות בין קונים לעסקים</h2>
    <button class="btn btn-primary" onclick="openMatchForm(null)">+ התאמה חדשה</button>
  </div>

  <div class="filters">
    <select id="fBuyer"><option value="all">כל הקונים</option></select>
    <select id="fBiz"><option value="all">כל העסקים</option></select>
    <select id="fStatus"><option value="all">כל הסטטוסים</option></select>
    <select id="fCreatedBy"><option value="all">כל מי שהזין</option></select>
    <select id="fSort">
      <option value="updated_desc">עודכן לאחרונה</option>
      <option value="created_desc">נוצר לאחרונה</option>
      <option value="created_by_asc">הוזן ע"י (א-ת)</option>
    </select>
  </div>

  <div style="overflow-x:auto;">
  <table>
    <thead>
      <tr><th>קונה</th><th>עסק</th><th>אחוז התאמה</th><th>סטטוס</th><th>הוזן ע"י</th><th>מטופל ע"י</th><th>נוצר</th><th>עודכן</th><th>פעולות</th></tr>
    </thead>
    <tbody id="matchBody"><tr class="empty-row"><td colspan="9">טוען...</td></tr></tbody>
  </table>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBox"></div></div>
<div id="toastBox"></div>

<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script>
const MATCH_STATUSES = ['התאמה חדשה','טרם נשלח לקונה','נשלח לקונה','ממתין לתגובה','הקונה התעניין','לא מתאים לקונה',
  'נחתם הסכם סודיות','נשלחו מסמכים','נקבעה פגישה','התקיימה פגישה','בבדיקה כלכלית','בבדיקת נאותות','במשא ומתן',
  'הוגשה הצעה','העסקה נסגרה','העסקה נעצרה','הקונה ויתר','המוכר ויתר'];

let ALL_MATCHES = [], ALL_BUYERS = [], ALL_BIZ = [], ALL_USERS = [], CURRENT_PROFILE = null;

function esc(s){ if(s===undefined||s===null) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleDateString('he-IL'); }catch(e){ return iso; } }
function fmtDateTime(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleString('he-IL'); }catch(e){ return iso; } }
function toast(msg){
  const box = document.getElementById('toastBox');
  const el = document.createElement('div'); el.className='toast'; el.textContent = msg;
  box.appendChild(el); setTimeout(()=>el.remove(), 3000);
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modalBox').innerHTML = '';
}
function buyerName(id){ const b = ALL_BUYERS.find(x=>x.id===id); return b ? b.full_name : '—'; }
function bizName(id){ const b = ALL_BIZ.find(x=>x.id===id); return b ? b.internal_name : '—'; }
function userName(id){
  const u = ALL_USERS.find(x=>x.id===id);
  return u ? (u.full_name && u.full_name.trim() ? u.full_name : u.email) : '—';
}
function statusClass(status){
  if (status === 'העסקה נסגרה') return 'status-closed';
  if (status === 'העסקה נעצרה' || status === 'הקונה ויתר' || status === 'המוכר ויתר') return 'status-stopped';
  if (status === 'במשא ומתן') return 'status-negotiation';
  return '';
}

async function loadLookups(){
  const [{data:buyers}, {data:biz}, {data:users}] = await Promise.all([
    window.supabaseClient.from('leads').select('id, full_name').eq('type','buyer'),
    window.supabaseClient.from('businesses').select('id, internal_name'),
    window.supabaseClient.from('profiles').select('id, full_name, email').eq('status','active')
  ]);
  ALL_BUYERS = buyers || []; ALL_BIZ = biz || []; ALL_USERS = users || [];

  const bSel = document.getElementById('fBuyer');
  ALL_BUYERS.forEach(b=>{ const o=document.createElement('option'); o.value=b.id; o.textContent=b.full_name; bSel.appendChild(o); });
  const zSel = document.getElementById('fBiz');
  ALL_BIZ.forEach(b=>{ const o=document.createElement('option'); o.value=b.id; o.textContent=b.internal_name; zSel.appendChild(o); });
  const sSel = document.getElementById('fStatus');
  MATCH_STATUSES.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sSel.appendChild(o); });
}

function populateCreatedByFilter(){
  const sel = document.getElementById('fCreatedBy');
  const existing = new Set(Array.from(sel.options).map(o=>o.value));
  const creators = [...new Set(ALL_MATCHES.map(m=>m.created_by).filter(Boolean))];
  creators.forEach(uid=>{
    if (!existing.has(uid)){ const o=document.createElement('option'); o.value=uid; o.textContent=userName(uid); sel.appendChild(o); }
  });
}

async function loadMatches(){
  const { data, error } = await window.supabaseClient.from('matches').select('*').order('updated_at',{ascending:false});
  if (error){ toast('שגיאה בטעינה: ' + error.message); return; }
  ALL_MATCHES = data || [];
  populateCreatedByFilter();
  renderTable();
}

function renderTable(){
  const fBuyer = document.getElementById('fBuyer').value;
  const fBiz = document.getElementById('fBiz').value;
  const fStatus = document.getElementById('fStatus').value;
  const fCreatedBy = document.getElementById('fCreatedBy').value;
  const fSort = document.getElementById('fSort').value;

  let rows = ALL_MATCHES.filter(m=>{
    if (fBuyer !== 'all' && m.buyer_id !== fBuyer) return false;
    if (fBiz !== 'all' && m.business_id !== fBiz) return false;
    if (fStatus !== 'all' && m.status !== fStatus) return false;
    if (fCreatedBy !== 'all' && m.created_by !== fCreatedBy) return false;
    return true;
  });

  rows.sort((a,b)=>{
    if (fSort === 'created_desc') return new Date(b.created_at) - new Date(a.created_at);
    if (fSort === 'created_by_asc') return userName(a.created_by).localeCompare(userName(b.created_by), 'he');
    return new Date(b.updated_at) - new Date(a.updated_at);
  });

  const body = document.getElementById('matchBody');
  if (rows.length === 0){ body.innerHTML = '<tr class="empty-row"><td colspan="9">לא נמצאו התאמות</td></tr>'; return; }

  body.innerHTML = rows.map(m=>`
    <tr>
      <td data-label="קונה">${esc(buyerName(m.buyer_id))}</td>
      <td data-label="עסק">${esc(bizName(m.business_id))}</td>
      <td data-label="אחוז התאמה">${m.match_percent!==null&&m.match_percent!==undefined ? m.match_percent+'%' : '—'}</td>
      <td data-label="סטטוס"><span class="status-pill ${statusClass(m.status)}">${esc(m.status)}</span></td>
      <td data-label="הוזן ע&quot;י">${m.created_by ? esc(userName(m.created_by)) : 'לא ידוע'}</td>
      <td data-label="מטופל ע&quot;י">${esc(userName(m.current_handler))}</td>
      <td data-label="נוצר">${fmtDate(m.created_at)}</td>
      <td data-label="עודכן">${fmtDate(m.updated_at)}</td>
      <td class="row-actions" data-label="">
        <button title="פתח" onclick="openMatchForm('${m.id}')">📂</button>
      </td>
    </tr>
  `).join('');
}

['fBuyer','fBiz','fStatus','fCreatedBy','fSort'].forEach(id=>document.getElementById(id).addEventListener('change', renderTable));

function buyerOptions(selected){
  return '<option value="">— בחר קונה —</option>' + ALL_BUYERS.map(b=>
    `<option value="${b.id}" ${b.id===selected?'selected':''}>${esc(b.full_name)}</option>`).join('');
}
function bizOptions(selected){
  return '<option value="">— בחר עסק —</option>' + ALL_BIZ.map(b=>
    `<option value="${b.id}" ${b.id===selected?'selected':''}>${esc(b.internal_name)}</option>`).join('');
}
function statusOptions(selected){
  return MATCH_STATUSES.map(s=>`<option value="${s}" ${s===selected?'selected':''}>${s}</option>`).join('');
}
function userOptions(selected){
  return '<option value="">— ללא —</option>' + ALL_USERS.map(u=>{
    const label = u.full_name && u.full_name.trim() ? u.full_name : u.email;
    return `<option value="${u.id}" ${u.id===selected?'selected':''}>${esc(label)}</option>`;
  }).join('');
}

async function openMatchForm(id){
  const match = id ? ALL_MATCHES.find(m=>m.id===id) : null;
  const modal = document.getElementById('modalBox');

  modal.innerHTML = `
    <h3>${match ? 'פרטי התאמה' : 'התאמה חדשה'}</h3>
    <form id="matchForm">
      <div class="form-grid">
        ${match ? `<div class="field full" style="background:#f7f5ef;border-radius:8px;padding:10px 12px;font-size:.8rem;color:#665;">
          מספר מזהה: <b>${esc(match.internal_code||'—')}</b> · נוצרה ע"י: <b>${esc(userName(match.created_by))}</b> בתאריך ${fmtDate(match.created_at)}
          ${match.transferred_by ? ` · הועברה ע"י: <b>${esc(userName(match.transferred_by))}</b>` : ''}
        </div>` : ''}
        <div class="field"><label>קונה</label><select id="buyer_id" ${match?'disabled':''}>${buyerOptions(match?.buyer_id)}</select></div>
        <div class="field"><label>עסק</label><select id="business_id" ${match?'disabled':''}>${bizOptions(match?.business_id)}</select></div>
        <div class="field"><label>אחוז התאמה</label><input type="number" id="match_percent" min="0" max="100" value="${match?.match_percent??''}"></div>
        <div class="field"><label>סטטוס</label><select id="status">${statusOptions(match?.status||'התאמה חדשה')}</select></div>
        <div class="field"><label>מטפל כרגע</label><select id="current_handler">${userOptions(match?.current_handler)}</select></div>
        <div class="field"><label>תגובת הקונה</label><input type="text" id="buyer_response" value="${esc(match?.buyer_response)}"></div>
        <div class="field full"><label>סיבת ההתאמה</label><textarea id="match_reason">${esc(match?.match_reason)}</textarea></div>
        <div class="field full"><label>הערות</label><textarea id="notes">${esc(match?.notes)}</textarea></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">ביטול</button>
        <button type="submit" class="btn btn-primary">שמירה</button>
      </div>
    </form>
    ${match ? `
      <div class="thread">
        <h4>משתתפים בהתאמה</h4>
        <div class="participants" id="participantsBox">טוען...</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <select id="addParticipantUser" style="flex:1;padding:7px;border:1px solid #d8d3c4;border-radius:8px;">${userOptions(null)}</select>
          <button class="btn btn-sm btn-ghost" onclick="addParticipant('${match.id}')">הוסף משתתף</button>
        </div>
      </div>
      <div class="thread">
        <h4>היסטוריית סטטוס</h4>
        <div id="historyBox">טוען...</div>
      </div>
    ` : ''}
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('matchForm').dataset.matchId = match ? match.id : '';
  document.getElementById('matchForm').addEventListener('submit', saveMatch);

  if (match){
    loadParticipants(match.id);
    loadHistory(match.id);
  }
}

async function loadParticipants(matchId){
  const { data } = await window.supabaseClient
    .from('match_participants')
    .select('user_id, role_in_match')
    .eq('match_id', matchId);
  const box = document.getElementById('participantsBox');
  if (!data || data.length === 0){ box.innerHTML = '<span style="color:#999;font-size:.78rem;">אין משתתפים נוספים עדיין</span>'; return; }
  box.innerHTML = data.map(p=>`<span class="participant-chip">${esc(userName(p.user_id))}${p.role_in_match?' · '+esc(p.role_in_match):''}</span>`).join('');
}

async function addParticipant(matchId){
  const userId = document.getElementById('addParticipantUser').value;
  if (!userId){ toast('בחר משתמש'); return; }
  const { error } = await window.supabaseClient.from('match_participants').insert({ match_id: matchId, user_id: userId });
  if (error){ toast('שגיאה: ' + error.message); return; }
  toast('המשתתף נוסף');
  loadParticipants(matchId);
}

async function loadHistory(matchId){
  const { data } = await window.supabaseClient
    .from('match_status_history')
    .select('status, changed_at, changed_by')
    .eq('match_id', matchId)
    .order('changed_at', { ascending: false });
  const box = document.getElementById('historyBox');
  if (!data || data.length === 0){ box.innerHTML = '<span style="color:#999;font-size:.78rem;">אין היסטוריה עדיין</span>'; return; }
  box.innerHTML = data.map(h=>`<div class="thread-item"><span>${esc(h.status)} · ${esc(userName(h.changed_by))}</span><span>${fmtDateTime(h.changed_at)}</span></div>`).join('');
}

async function saveMatch(e){
  e.preventDefault();
  const form = e.target;
  const matchId = form.dataset.matchId;
  const g = id => document.getElementById(id) ? document.getElementById(id).value : null;
  const num = v => v === '' || v === null ? null : Number(v);

  if (matchId){
    const payload = {
      match_percent: num(g('match_percent')),
      status: g('status'),
      current_handler: g('current_handler') || null,
      buyer_response: g('buyer_response'),
      match_reason: g('match_reason'),
      notes: g('notes')
    };
    const { error } = await window.supabaseClient.from('matches').update(payload).eq('id', matchId);
    if (error){ toast('שגיאה בשמירה: ' + error.message); return; }
  } else {
    const buyerId = g('buyer_id'), bizId = g('business_id');
    if (!buyerId || !bizId){ toast('יש לבחור קונה ועסק'); return; }
    const payload = {
      buyer_id: buyerId, business_id: bizId,
      match_percent: num(g('match_percent')),
      status: g('status'),
      current_handler: g('current_handler') || null,
      transferred_by: CURRENT_PROFILE ? CURRENT_PROFILE.id : null,
      transferred_at: new Date().toISOString(),
      buyer_response: g('buyer_response'),
      match_reason: g('match_reason'),
      notes: g('notes')
    };
    const { error } = await window.supabaseClient.from('matches').insert(payload);
    if (error){ toast('שגיאה בשמירה: ' + error.message); return; }
  }

  toast('נשמר בהצלחה');
  closeModal();
  await loadMatches();
}

(async function init(){
  CURRENT_PROFILE = await requireAuth();
  if (!CURRENT_PROFILE) return;
  await loadLookups();
  document.getElementById('headerUserInfo').textContent = ((CURRENT_PROFILE.full_name && CURRENT_PROFILE.full_name.trim()) ? CURRENT_PROFILE.full_name : CURRENT_PROFILE.email) + ' · ' + new Date().toLocaleDateString('he-IL');
  await loadMatches();
})();
</script>
</body>
</html>
