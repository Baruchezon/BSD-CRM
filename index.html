<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSD CRM - ניהול קונים, מוכרים ועסקים למכירה</title>
<style>
  :root{
    --navy:#1B2A4A;
    --navy-dark:#131f38;
    --gold:#B89630;
    --gold-light:#e8d9ad;
    --bg:#F5F6F8;
    --white:#ffffff;
    --gray-light:#E9ECEF;
    --text:#22293A;
    --muted:#6b7280;
    --buyer-bg:#EAF2FB;
    --buyer-border:#2E6DA4;
    --seller-bg:#FBF3E1;
    --seller-border:#B89630;
    --green-bg:#E4F6E9; --green-txt:#1e7d3c;
    --red-bg:#FBE7E6; --red-txt:#b23b34;
    --gold-bg:#FBF0D9; --gold-txt:#8a6d13;
    --blue-bg:#E2EEFB; --blue-txt:#1c5b93;
    --gray-bg:#EDEEF0; --gray-txt:#555;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
  h1,h2,h3{margin:0 0 8px 0;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;font-size:14px;padding:9px 10px;border:1px solid #d3d6dc;border-radius:7px;width:100%;background:#fff;color:var(--text);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);border-color:var(--gold);}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:600px){.field-row{grid-template-columns:1fr;}}

  /* Top bar */
  .topbar{background:linear-gradient(90deg,var(--navy),var(--navy-dark));color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .logo-badge{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid #f5e6b8;flex-shrink:0;background:#fff;}
  .brand-text h1{font-size:16px;color:#fff;}
  .brand-text p{margin:0;font-size:11px;color:var(--gold-light);}
  .hamburger{display:block;background:none;border:1px solid rgba(255,255,255,.3);color:#fff;font-size:18px;cursor:pointer;padding:6px 12px;border-radius:6px;}
  @media(min-width:900px){.hamburger{display:none;}}

  nav.main-nav{display:none;flex-direction:column;background:var(--navy-dark);border-top:1px solid rgba(255,255,255,.12);}
  nav.main-nav.open{display:flex;}
  .nav-btn{background:none;border:none;color:#ffffff;padding:15px 18px;min-height:48px;text-align:right;cursor:pointer;font-size:14.5px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.1);}
  .nav-btn:hover{background:rgba(184,150,48,.35);color:#ffffff;}
  .nav-btn.active{color:var(--navy-dark);font-weight:800;background:var(--gold);}
  .nav-btn.active:hover{background:var(--gold);color:var(--navy-dark);}
  @media(min-width:900px){
    nav.main-nav{display:flex !important;flex-direction:row;flex-wrap:wrap;}
    .nav-btn{border-bottom:3px solid transparent;padding:13px 18px;min-height:auto;}
    .nav-btn.active{border-bottom-color:var(--gold);background:rgba(184,150,48,.18);color:var(--gold);}
    .nav-btn.active:hover{background:rgba(184,150,48,.28);color:var(--gold);}
  }
  .nav-wrap{width:100%;background:var(--navy-dark);}
  @media(min-width:900px){.nav-wrap{width:auto;background:var(--navy-dark);}}

  .container{max-width:1300px;margin:0 auto;padding:16px;}
  .screen-title{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .screen-title h2{color:var(--navy);font-size:20px;border-right:4px solid var(--gold);padding-right:10px;}

  /* Cards */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px;}
  .card{background:var(--white);border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-right:4px solid var(--gold);}
  .card.alt{border-right-color:var(--buyer-border);}
  .agr-card{cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .agr-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
  .agr-card.agr-red{background:var(--red-bg);border-right-color:var(--red-txt);}
  .agr-card.agr-red .num{color:var(--red-txt);}
  .agr-card.agr-gold{background:var(--gold-bg);border-right-color:var(--gold-txt);}
  .agr-card.agr-gold .num{color:var(--gold-txt);}
  .agr-card.agr-green{background:var(--green-bg);border-right-color:var(--green-txt);}
  .agr-card.agr-green .num{color:var(--green-txt);}
  .card .num{font-size:26px;font-weight:800;color:var(--navy);}
  .card .label{font-size:12.5px;color:var(--muted);margin-top:3px;}

  .panels-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:900px){.panels-grid{grid-template-columns:1fr;}}
  .panel{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;}
  .panel h3{font-size:14.5px;color:var(--navy);margin-bottom:10px;border-bottom:2px solid var(--gray-light);padding-bottom:6px;}
  .mini-list{list-style:none;margin:0;padding:0;font-size:13px;}
  .mini-list li{padding:7px 4px;border-bottom:1px dashed var(--gray-light);display:flex;justify-content:space-between;gap:8px;cursor:pointer;}
  .mini-list li:hover{background:var(--bg);}
  .mini-list .empty{color:var(--muted);text-align:center;padding:10px;cursor:default;}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;background:#fff;padding:10px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .toolbar input, .toolbar select{width:auto;min-width:140px;flex:1;}
  .toolbar .btn{flex-shrink:0;}

  /* Buttons */
  .btn{padding:9px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-dark);}
  .btn-gold{background:var(--gold);color:#1B2A4A;}
  .btn-gold:hover{filter:brightness(1.05);}
  .btn-outline{background:#fff;border:1px solid #ccc;color:var(--text);}
  .btn-outline:hover{background:var(--gray-light);}
  .btn-danger{background:var(--red-txt);color:#fff;}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-block{width:100%;}

  /* Table */
  .table-wrap{overflow-x:auto;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px;}
  th,td{padding:10px 12px;text-align:right;border-bottom:1px solid #eee;white-space:nowrap;}
  th{background:var(--navy);color:#fff;font-weight:600;font-size:12.5px;position:sticky;top:0;}
  tr.row-buyer{background:var(--buyer-bg);}
  tr.row-seller{background:var(--seller-bg);}
  tr:hover td{filter:brightness(.97);}
  td.wrap{white-space:normal;max-width:220px;}
  .empty-row td{text-align:center;color:var(--muted);padding:26px;}

  /* Badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .b-green{background:var(--green-bg);color:var(--green-txt);}
  .b-red{background:var(--red-bg);color:var(--red-txt);}
  .b-gold{background:var(--gold-bg);color:var(--gold-txt);}
  .b-blue{background:var(--blue-bg);color:var(--blue-txt);}
  .b-gray{background:var(--gray-bg);color:var(--gray-txt);}
  .b-buyer{background:var(--buyer-border);color:#fff;}
  .b-seller{background:var(--seller-border);color:#fff;}
  .tag-chip{display:inline-block;background:var(--gray-light);color:var(--navy);border-radius:14px;padding:2px 9px;font-size:11px;margin:2px 2px;}

  .row-actions{display:flex;gap:6px;flex-wrap:nowrap;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,20,35,.55);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:20px 10px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:22px;margin:20px auto;box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modal-header h3{color:var(--navy);font-size:17px;}
  .close-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
  .modal-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .modal-tab{padding:7px 12px;border-radius:7px;border:1px solid var(--gray-light);background:#fafafa;cursor:pointer;font-size:12.5px;}
  .modal-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .modal-section{display:none;}
  .modal-section.active{display:block;}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;border-top:1px solid var(--gray-light);padding-top:14px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13.5px;}
  @media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
  .detail-grid .k{color:var(--muted);font-size:11.5px;}
  .detail-grid .v{font-weight:600;color:var(--text);margin-bottom:6px;}
  .divider{border:none;border-top:1px solid var(--gray-light);margin:12px 0;}

  /* Toast */
  #toast-wrap{position:fixed;bottom:20px;left:20px;z-index:400;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--navy);color:#fff;padding:12px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.25);font-size:13.5px;border-right:4px solid var(--gold);animation:slidein .25s ease;}
  @keyframes slidein{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .warn-box{background:var(--gold-bg);border:1px solid var(--gold);color:var(--gold-txt);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:10px;}
  .section-block{background:#fff;padding:16px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;}
  .footer-note{text-align:center;color:var(--muted);font-size:12px;padding:22px 10px 30px;}
  .link-btn{background:none;border:none;color:var(--blue-txt);text-decoration:underline;cursor:pointer;font-size:13px;padding:0;}
  .count-pill{background:var(--gray-light);color:var(--navy);border-radius:12px;padding:1px 8px;font-size:11px;font-weight:700;margin-right:4px;}

  /* Dates cell */
  .dates-mini{font-size:11.5px;line-height:1.65;white-space:normal;min-width:120px;}
  .dates-mini .d-label{color:var(--muted);font-weight:600;}
  .fu-overdue{color:var(--red-txt);font-weight:800;}
  .fu-today{color:var(--gold-txt);font-weight:800;}

  /* Filter banner */
  .filter-banner{background:var(--gold-bg);border:1px solid var(--gold);color:var(--navy);padding:9px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  /* Back button */
  .back-bar{margin-bottom:12px;}
  .back-btn{background:#fff;border:1.5px solid var(--navy);color:var(--navy);font-weight:700;padding:10px 20px;min-height:44px;border-radius:8px;}
  .back-btn:hover{background:var(--navy);color:#fff;}
  @media(max-width:600px){.back-btn{width:100%;font-size:15px;}}

  /* KPI cards */
  .kpi-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
  .kpi-card{cursor:pointer;text-align:center;transition:transform .12s,box-shadow .12s;border-right-width:5px;}
  .kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12);}
  .kpi-icon{font-size:20px;margin-bottom:4px;}
  .kpi-buyer{border-right-color:var(--buyer-border);} .kpi-buyer .num{color:var(--buyer-border);}
  .kpi-seller{border-right-color:var(--seller-border);} .kpi-seller .num{color:var(--seller-border);}
  .kpi-biz{border-right-color:#3d5a80;} .kpi-biz .num{color:#3d5a80;}
  .kpi-match{border-right-color:#6b8f71;} .kpi-match .num{color:#6b8f71;}
  .kpi-gold{border-right-color:var(--gold);} .kpi-gold .num{color:var(--gold-txt);}
  .kpi-green{border-right-color:var(--green-txt);} .kpi-green .num{color:var(--green-txt);}
  .kpi-warn{border-right-color:var(--red-txt);} .kpi-warn .num{color:var(--red-txt);}

  /* mini stats (used in summary sections) */
  .mini-stat{cursor:pointer;text-align:center;padding:12px 10px;transition:transform .12s,box-shadow .12s;}
  .mini-stat:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
  .mini-stat .num{font-size:21px;}
  .mini-stat .label{font-size:11.5px;}
  .mini-buyer{border-right-color:var(--buyer-border);} .mini-buyer .num{color:var(--buyer-border);}
  .mini-seller{border-right-color:var(--seller-border);} .mini-seller .num{color:var(--seller-border);}
  .mini-biz{border-right-color:#3d5a80;} .mini-biz .num{color:#3d5a80;}
  .mini-green{border-right-color:var(--green-txt);} .mini-green .num{color:var(--green-txt);}
  .mini-red{border-right-color:var(--red-txt);} .mini-red .num{color:var(--red-txt);}
  .mini-gold{border-right-color:var(--gold);} .mini-gold .num{color:var(--gold-txt);}
  .mini-blue{border-right-color:var(--blue-txt);} .mini-blue .num{color:var(--blue-txt);}
  .mini-gray{border-right-color:#999;} .mini-gray .num{color:#666;}

  /* progress bars */
  .progress-row{margin-bottom:14px;}
  .progress-label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--navy);margin-bottom:5px;font-weight:600;}
  .progress-track{background:var(--gray-light);border-radius:20px;height:10px;overflow:hidden;}
  .progress-fill{background:linear-gradient(90deg,var(--gold),var(--navy));height:100%;border-radius:20px;transition:width .4s;}
  .split-bar{display:flex;height:14px;border-radius:20px;overflow:hidden;background:var(--gray-light);}
  .split-bar-buyer{background:var(--buyer-border);}
  .split-bar-seller{background:var(--seller-border);}

  /* collapsible dashboard sections */
  details.section-block summary{cursor:pointer;font-size:14.5px;font-weight:700;color:var(--navy);list-style:none;padding:2px 0;}
  details.section-block summary::-webkit-details-marker{display:none;}
  details.section-block summary::before{content:'▸ ';color:var(--gold);}
  details.section-block[open] summary::before{content:'▾ ';}
</style>
</head>

<script>
/* ============ DATA LAYER ============ */
const STORAGE_KEY='bsd_crm_data_v1';
let DB = null;

/* עטיפת אחסון בטוחה: בטלפוני אנדרואיד רבים, פתיחת קובץ HTML ישירות (file://)
   חוסמת גישה ל-localStorage וגורמת לדף להיראות "לא עובד" (מסך לבן).
   העטיפה הזו תופסת את השגיאה ועוברת לאחסון זמני בזיכרון כדי שהאפליקציה תמיד תעבוד,
   ומציגה התראה ידידותית אם השמירה הקבועה לא זמינה. */
let storageAvailable = true;
const memoryStore = {};
function safeGet(key){
  try{ return localStorage.getItem(key); }
  catch(e){ storageAvailable=false; return (key in memoryStore)? memoryStore[key] : null; }
}
function safeSet(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){ storageAvailable=false; memoryStore[key]=value; return false; }
}
function checkStorageAvailability(){
  try{
    const testKey='__bsd_storage_test__';
    localStorage.setItem(testKey,'1');
    localStorage.removeItem(testKey);
    storageAvailable=true;
  }catch(e){ storageAvailable=false; }
}

const LEAD_STATUSES=['חדש','בטיפול','ממתין למידע','נשלח הסכם','הסכם חתום','לא רלוונטי','עסקה מתקדמת','נסגרה עסקה'];
const BUSINESS_STATUSES=['חדש','באיסוף חומרים','מוכן לשיווק','הוצע לקונים','במשא ומתן','בבדיקת קונה','בהקפאה','נמכר','לא רלוונטי'];
const AGREEMENT_STATUSES=['אין הסכם','נשלח הסכם','ממתין לחתימה','חתום'];
const MATCH_STATUSES=['הוצע','נשלחו פרטים ראשוניים','נשלח תקציר','נשלח NDA','ממתינים לתגובה','מעוניין','לא מעוניין','נקבעה שיחה','נקבעה פגישה','בבדיקה','משא ומתן','עסקה נסגרה','עסקה ירדה'];
const INTEREST_LEVELS=['קר','בינוני','חם','חם מאוד'];
const TASK_STATUSES=['פתוח','בטיפול','בוצע','נדחה','בוטל'];
const TASK_PRIORITIES=['רגילה','גבוהה','דחופה'];
const TAGS_SUGGESTED=['מסעדה','חינוך','זכיינות','קמעונאות','שירותים','השקעה פסיבית','עד מיליון','מעל מיליון'];

const GREEN=['הסכם חתום','נסגרה עסקה','חתום','נמכר','מעוניין','עסקה נסגרה','בוצע'];
const RED=['לא רלוונטי','לא מעוניין','עסקה ירדה','בוטל','נדחה','אין הסכם'];
const GOLDC=['עסקה מתקדמת','במשא ומתן','משא ומתן','נקבעה פגישה','נקבעה שיחה','דחופה','גבוהה','חם','חם מאוד','ממתין לחתימה','נשלח הסכם'];
const BLUE=['בטיפול','ממתין למידע','נשלחו פרטים ראשוניים','נשלח תקציר','נשלח NDA','ממתינים לתגובה','בבדיקה','בבדיקת קונה','הוצע לקונים','מוכן לשיווק','באיסוף חומרים'];

function badgeClass(status){
  if(GREEN.includes(status)) return 'b-green';
  if(RED.includes(status)) return 'b-red';
  if(GOLDC.includes(status)) return 'b-gold';
  if(BLUE.includes(status)) return 'b-blue';
  return 'b-gray';
}
function badge(status){ return status? `<span class="badge ${badgeClass(status)}">${esc(status)}</span>` : ''; }
function esc(s){ if(s===undefined||s===null) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(pfx){ return pfx+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function fmtDate(iso){ if(!iso) return '—'; try{ const d=new Date(iso); return d.toLocaleDateString('he-IL'); }catch(e){ return iso; } }
function daysSince(iso){ if(!iso) return null; const d=new Date(iso); const diff=Math.floor((Date.now()-d.getTime())/86400000); return diff; }
function isOverdue(iso){ if(!iso) return false; return iso < todayISO(); }
function isToday(iso){ return iso===todayISO(); }
function datesCell(created, updated, followUp){
  let fuClass='', fuIcon='';
  if(followUp){
    if(isOverdue(followUp)){ fuClass='fu-overdue'; fuIcon='⚠️ '; }
    else if(isToday(followUp)){ fuClass='fu-today'; fuIcon='🔶 '; }
  }
  return `<div class="dates-mini">
    <div><span class="d-label">קליטה:</span> ${fmtDate(created)}</div>
    <div><span class="d-label">עודכן:</span> ${fmtDate(updated)}</div>
    <div class="${fuClass}"><span class="d-label">מעקב:</span> ${fuIcon}${followUp?fmtDate(followUp):'—'}</div>
  </div>`;
}

function loadDB(){
  checkStorageAvailability();
  const raw = safeGet(STORAGE_KEY);
  if(raw){ try{ DB = JSON.parse(raw); }catch(e){ DB=null; } }
  if(!DB){ DB = {leads:[], businesses:[], matches:[], tasks:[], settings:{orgName:'BSD Business Brokers Israel', buyerColor:'#EAF2FB', sellerColor:'#FBF3E1'}}; seedData(); }
  if(!DB.settings) DB.settings={orgName:'BSD Business Brokers Israel', buyerColor:'#EAF2FB', sellerColor:'#FBF3E1'};
  migrateDB();
  saveDB();
}
/* מיגרציה אוטומטית: משלימה שדות חסרים ברשומות ישנות בלי למחוק מידע קיים */
function migrateDB(){
  if(!Array.isArray(DB.leads)) DB.leads=[];
  if(!Array.isArray(DB.businesses)) DB.businesses=[];
  if(!Array.isArray(DB.matches)) DB.matches=[];
  if(!Array.isArray(DB.tasks)) DB.tasks=[];
  DB.leads.forEach(l=>{
    if(l.agreementSent===undefined) l.agreementSent='לא';
    if(l.agreementSigned===undefined) l.agreementSigned='לא';
    if(!l.tags) l.tags=[];
    if(!l.updatedDate) l.updatedDate=l.createdDate||nowISO();
    if(!l.createdDate) l.createdDate=nowISO();
  });
  DB.businesses.forEach(b=>{
    if(b.leadId===undefined) b.leadId='';
    if(!b.agreementStatus) b.agreementStatus='אין הסכם';
    if(!b.updatedDate) b.updatedDate=b.createdDate||nowISO();
    if(!b.createdDate) b.createdDate=nowISO();
  });
}
function saveDB(){ safeSet(STORAGE_KEY, JSON.stringify(DB)); }

function seedData(){
  const l1=uid('lead'); const l2=uid('lead'); const l3=uid('lead'); const l4=uid('lead'); const l5=uid('lead');

/* ============ HELPERS: lookups ============ */
function leadAgreementStatus(l){
  if(!l) return 'אין הסכם';
  if(l.agreementSigned==='כן') return 'הסכם חתום';
  if(l.agreementSent==='כן') return 'נשלח הסכם';
  return 'אין הסכם';
}
function getLead(id){ return DB.leads.find(x=>x.id===id); }
function getBusiness(id){ return DB.businesses.find(x=>x.id===id); }
function getMatch(id){ return DB.matches.find(x=>x.id===id); }
function leadLabel(id){ const l=getLead(id); return l? `${l.name} (${l.type==='buyer'?'קונה':'מוכר'})` : '—'; }
function bizLabel(id){ const b=getBusiness(id); return b? b.name : '—'; }
function buyerLeads(){ return DB.leads.filter(l=>l.type==='buyer'); }
function sellerLeads(){ return DB.leads.filter(l=>l.type==='seller'); }
function businessesForSeller(leadId){ return DB.businesses.filter(b=>b.leadId===leadId); }
function matchesForBuyer(leadId){ return DB.matches.filter(m=>m.buyerId===leadId); }
function matchesForBusiness(bizId){ return DB.matches.filter(m=>m.businessId===bizId); }

/* ============ TOAST ============ */
function toast(msg){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2600);
}

/* ============ NAV ============ */
let currentScreen='dashboard';
let activeFilterLabel=null;
let screenHistory=[];

function filterBanner(){
  if(!activeFilterLabel) return '';
  return `<div class="filter-banner">🔎 מציג כעת: <b>${esc(activeFilterLabel)}</b> <button class="btn btn-outline btn-sm" onclick="clearActiveFilter()">✕ נקה סינון</button></div>`;
}
function resetScreenFilters(screen){
  if(screen==='leads') leadFilter={search:'',type:'all',status:'all',agreement:'all',followup:'all',hasOffer:'all',statusExcludeIrrelevant:false,activeQuick:'all'};
  if(screen==='businesses') bizFilter={search:'',status:'all',agreement:'all',drive:'all',offered:'all'};
  if(screen==='matches') matchFilter={buyer:'all',business:'all',status:'all',interest:'all',interestGroup:'all',openOnly:false};
  if(screen==='tasks') taskFilter='all';
}
function clearActiveFilter(){
  activeFilterLabel=null;
  resetScreenFilters(currentScreen);
  render();
}
/* מנגנון היסטוריה פנימי: שומר מסך + סינון פעיל לפני כל ניווט, לצורך כפתור חזרה */
function snapshotState(){
  return {
    screen: currentScreen,
    leadFilter: {...leadFilter},
    bizFilter: {...bizFilter},
    matchFilter: {...matchFilter},
    taskFilter: taskFilter,
    activeFilterLabel: activeFilterLabel
  };
}
function pushHistory(){
  screenHistory.push(snapshotState());
  if(screenHistory.length>40) screenHistory.shift();
}
function restoreSnapshot(snap){
  currentScreen = snap.screen;
  leadFilter = snap.leadFilter;
  bizFilter = snap.bizFilter;
  matchFilter = snap.matchFilter;
  taskFilter = snap.taskFilter;
  activeFilterLabel = snap.activeFilterLabel;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navBtn=document.querySelector(`.nav-btn[data-screen="${currentScreen}"]`); if(navBtn) navBtn.classList.add('active');
  render();
}
function goBack(){
  if(screenHistory.length===0){
    activeFilterLabel=null;
    resetScreenFilters('leads'); resetScreenFilters('businesses'); resetScreenFilters('matches'); resetScreenFilters('tasks');
    switchToScreen('dashboard');
    render();
    return;
  }
  const prev = screenHistory.pop();
  restoreSnapshot(prev);
}
function backButtonHtml(){
  return `<div class="back-bar"><button class="btn btn-outline back-btn" onclick="goBack()">← חזרה</button></div>`;
}
function switchToScreen(target){
  currentScreen=target;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navBtn=document.querySelector(`.nav-btn[data-screen="${target}"]`); if(navBtn) navBtn.classList.add('active');
}
/* פונקציה מרכזית לסינון מהדשבורד: מעבירה מסך ומפעילה סינון עם כותרת ברורה */
function applyDashboardFilter(target, filterType, filterValue, label){
  pushHistory();
  activeFilterLabel = label;
  resetScreenFilters(target);
  if(target==='leads'){
    if(filterType==='type') leadFilter.type=filterValue;
    else if(filterType==='buyersActive'){ leadFilter.type='buyer'; leadFilter.statusExcludeIrrelevant=true; }
    else if(filterType==='sellersActive'){ leadFilter.type='seller'; leadFilter.statusExcludeIrrelevant=true; }
    else if(filterType==='agreement') leadFilter.agreement=filterValue;
    else if(filterType==='agreementForType'){ leadFilter.type=filterValue.type; leadFilter.agreement=filterValue.agreement; }
    else if(filterType==='followup') leadFilter.followup=filterValue;
    else if(filterType==='followupForType'){ leadFilter.type=filterValue.type; leadFilter.followup=filterValue.followup; }
    else if(filterType==='hasOfferForType'){ leadFilter.type=filterValue.type; leadFilter.hasOffer=filterValue.hasOffer; }
    leadFilter.activeQuick=null;
  } else if(target==='businesses'){
    if(filterType==='status') bizFilter.status=filterValue;
    else if(filterType==='agreement') bizFilter.agreement=filterValue;
    else if(filterType==='drive') bizFilter.drive=filterValue;
    else if(filterType==='offered') bizFilter.offered=filterValue;
  } else if(target==='matches'){
    if(filterType==='interestGroup') matchFilter.interestGroup=filterValue;
    else if(filterType==='status') matchFilter.status=filterValue;
    else if(filterType==='openOnly') matchFilter.openOnly=true;
  } else if(target==='tasks'){
    if(filterType==='due') taskFilter=filterValue;
  }
  switchToScreen(target);
  render();
}
function goToLeadsFiltered(type, agreement){
  applyDashboardFilter('leads','agreementForType',{type, agreement},
    (type==='buyer'?'קונים ':'מוכרים ')+(agreement==='none'?'ללא הסכם':agreement==='sent'?'עם הסכם שנשלח':'עם הסכם חתום'));
}
document.getElementById('hamburgerBtn').addEventListener('click',()=>{
  document.getElementById('mainNav').classList.toggle('open');
});
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const target=btn.dataset.screen;
    if(target!==currentScreen) pushHistory();
    currentScreen=target;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('mainNav').classList.remove('open');
    render();
  });
});

function render(){
  const app=document.getElementById('app');
  let screenHtml='';
  if(currentScreen==='dashboard') screenHtml=renderDashboard();
  else if(currentScreen==='leads') screenHtml=renderLeadsScreen();
  else if(currentScreen==='businesses') screenHtml=renderBusinessesScreen();
  else if(currentScreen==='matches') screenHtml=renderMatchesScreen();
  else if(currentScreen==='tasks') screenHtml=renderTasksScreen();
  else if(currentScreen==='settings') screenHtml=renderSettingsScreen();
  app.innerHTML = (currentScreen!=='dashboard' ? backButtonHtml() : '') + screenHtml;
  wireScreenEvents();
}

function dashCard(num,label){ return `<div class="card"><div class="num">${num}</div><div class="label">${esc(label)}</div></div>`; }
function dashCardInner(num,label){ return `<div class="num">${num}</div><div class="label">${esc(label)}</div>`; }
function kpiCard(icon,num,label,colorKey,onclick){

    <div class="kpi-icon">${icon}</div><div class="num">${num}</div><div class="label">${esc(label)}</div>
  </div>`;
}
function miniStat(num,label,colorKey,onclick){
  return `<div class="card mini-stat mini-${colorKey}" onclick="${onclick}" role="button" tabindex="0">
    <div class="num">${num}</div><div class="label">${esc(label)}</div>
  </div>`;

function progressBar(label, pct, subtext){
  const p = Math.max(0, Math.min(100, pct||0));
  return `<div class="progress-row">
    <div class="progress-label"><span>${esc(label)}</span><span>${p}% (${esc(subtext)})</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${p}%;"></div></div>
  </div>`;
}


/* ============ TASKS aggregation (auto + manual) ============ */
function getAllTasks(){
  const manual = DB.tasks.map(t=>({...t, source:'manual'}));
  const autoLead = DB.leads.filter(l=>l.nextFollowUpDate).map(l=>({
    id:'auto_lead_'+l.id, title:`מעקב אחר ${l.type==='buyer'?'קונה':'מוכר'}: ${l.name}`,
    linkedType:'lead', linkedId:l.id, dueDate:l.nextFollowUpDate, status: l.status==='לא רלוונטי'?'בוטל':'פתוח',
    priority:'רגילה', notes:l.nextSteps||'', auto:true, source:'lead'
  }));
  const autoMatch = DB.matches.filter(m=>m.nextFollowUpDate).map(m=>({
    id:'auto_match_'+m.id, title:`מעקב התאמה: ${leadLabel(m.buyerId)} ⇄ ${bizLabel(m.businessId)}`,
    linkedType:'match', linkedId:m.id, dueDate:m.nextFollowUpDate, status: ['עסקה נסגרה','עסקה ירדה','לא מעוניין'].includes(m.status)?'בוטל':'פתוח',
    priority: ['חם','חם מאוד'].includes(m.interestLevel)?'גבוהה':'רגילה', notes:m.nextAction||'', auto:true, source:'match'
  }));
  return [...manual, ...autoLead, ...autoMatch];
}

let leadFilter={search:'',type:'all',status:'all',agreement:'all',followup:'all',hasOffer:'all',statusExcludeIrrelevant:false,activeQuick:'all'};
const LEAD_QUICK_FILTERS=[
  {key:'all', label:'כל הלידים', set:{type:'all',agreement:'all',followup:'all'}},
  {key:'buyers', label:'רק קונים', set:{type:'buyer',agreement:'all',followup:'all'}},
  {key:'sellers', label:'רק מוכרים', set:{type:'seller',agreement:'all',followup:'all'}},
  {key:'buyers_none', label:'קונים ללא הסכם', set:{type:'buyer',agreement:'none',followup:'all'}},
  {key:'buyers_sent', label:'קונים עם הסכם שנשלח', set:{type:'buyer',agreement:'sent',followup:'all'}},
  {key:'buyers_signed', label:'קונים עם הסכם חתום', set:{type:'buyer',agreement:'signed',followup:'all'}},
  {key:'sellers_none', label:'מוכרים ללא הסכם', set:{type:'seller',agreement:'none',followup:'all'}},
  {key:'sellers_sent', label:'מוכרים עם הסכם שנשלח', set:{type:'seller',agreement:'sent',followup:'all'}},
  {key:'sellers_signed', label:'מוכרים עם הסכם חתום', set:{type:'seller',agreement:'signed',followup:'all'}},
  {key:'followup_today', label:'מעקב להיום', set:{type:'all',agreement:'all',followup:'today'}},
  {key:'followup_overdue', label:'מעקב שעבר זמנו', set:{type:'all',agreement:'all',followup:'overdue'}},
];
function applyLeadQuickFilter(key){
  const qf=LEAD_QUICK_FILTERS.find(q=>q.key===key); if(!qf) return;
  activeFilterLabel=null;
  leadFilter.type=qf.set.type; leadFilter.agreement=qf.set.agreement; leadFilter.followup=qf.set.followup;
  leadFilter.hasOffer='all'; leadFilter.statusExcludeIrrelevant=false;
  leadFilter.activeQuick=key;
  render();
}
function renderLeadsScreen(){
  let list=DB.leads.filter(l=>{
    if(leadFilter.type!=='all' && l.type!==leadFilter.type) return false;
    if(leadFilter.status!=='all' && l.status!==leadFilter.status) return false;
    const ag=leadAgreementStatus(l);
    if(leadFilter.agreement==='none' && ag!=='אין הסכם') return false;
    if(leadFilter.agreement==='sent' && ag!=='נשלח הסכם') return false;
    if(leadFilter.agreement==='signed' && ag!=='הסכם חתום') return false;
    if(leadFilter.followup==='today' && l.nextFollowUpDate!==todayISO()) return false;
    if(leadFilter.followup==='overdue' && !(l.nextFollowUpDate && isOverdue(l.nextFollowUpDate))) return false;
    if(leadFilter.statusExcludeIrrelevant && l.status==='לא רלוונטי') return false;
    if(leadFilter.hasOffer!=='all'){
      const cnt = l.type==='buyer'? matchesForBuyer(l.id).length : businessesForSeller(l.id).length;
      if(leadFilter.hasOffer==='yes' && cnt===0) return false;
      if(leadFilter.hasOffer==='no' && cnt>0) return false;
    }
    if(leadFilter.search){
      const s=leadFilter.search.toLowerCase();
      const hay=[l.name,l.phone,l.city,l.source,l.status,...(l.tags||[])].join(' ').toLowerCase();
      if(!hay.includes(s)) return false;
    }
    return true;
  }).sort((a,b)=>b.updatedDate.localeCompare(a.updatedDate));

  const rows = list.map(l=>{
    const relatedCount = l.type==='buyer'? matchesForBuyer(l.id).length : businessesForSeller(l.id).length;
    const relBtn = l.type==='buyer'
      ? `<button class="btn btn-outline btn-sm" onclick="openBuyerOffers('${l.id}')">עסקים שהוצעו (${relatedCount})</button>`
      : `<button class="btn btn-outline btn-sm" onclick="openSellerOffers('${l.id}')">למי נשלח</button>`;
    return `<tr class="row-${l.type}">
      <td>${l.type==='buyer'?'<span class="badge b-buyer">קונה</span>':'<span class="badge b-seller">מוכר</span>'}</td>
      <td>${esc(l.name)}</td>
      <td>${esc(l.phone)}</td>
      <td>${esc(l.city)}</td>
      <td>${esc(l.source)}</td>
      <td>${badge(l.status)}</td>
      <td>${badge(leadAgreementStatus(l))}</td>
      <td class="dates-cell">${datesCell(l.createdDate, l.updatedDate, l.nextFollowUpDate)}</td>
      <td>${relBtn}</td>
      <td class="row-actions">
        <button class="btn btn-outline btn-sm" onclick="openLeadDetail('${l.id}')">פתח</button>
        <button class="btn btn-primary btn-sm" onclick="openLeadForm('${l.id}')">ערוך</button>
        <button class="btn btn-danger btn-sm" onclick="deleteLead('${l.id}')">מחק</button>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="screen-title"><h2>לידים ואנשי קשר</h2><button class="btn btn-gold" onclick="openLeadForm()">+ ליד חדש</button></div>
  ${filterBanner()}
  <div class="toolbar" style="gap:6px;">
    ${LEAD_QUICK_FILTERS.map(qf=>`<button class="btn ${leadFilter.activeQuick===qf.key?'btn-primary':'btn-outline'} btn-sm" onclick="applyLeadQuickFilter('${qf.key}')">${esc(qf.label)}</button>`).join('')}
  </div>
  <div class="toolbar">
    <input type="text" id="leadSearch" placeholder="חיפוש לפי שם, טלפון, עיר, מקור, סטטוס או תגית..." value="${esc(leadFilter.search)}">
    <select id="leadTypeFilter">
      <option value="all" ${leadFilter.type==='all'?'selected':''}>הכל</option>
      <option value="buyer" ${leadFilter.type==='buyer'?'selected':''}>קונים בלבד</option>
      <option value="seller" ${leadFilter.type==='seller'?'selected':''}>מוכרים בלבד</option>
    </select>
    <select id="leadStatusFilter">
      <option value="all">כל הסטטוסים</option>
      ${LEAD_STATUSES.map(s=>`<option value="${esc(s)}" ${leadFilter.status===s?'selected':''}>${esc(s)}</option>`).join('')}
    </select>
    <select id="leadAgreementFilter">
      <option value="all" ${leadFilter.agreement==='all'?'selected':''}>כל סטטוסי ההסכם</option>
      <option value="none" ${leadFilter.agreement==='none'?'selected':''}>אין הסכם</option>
      <option value="sent" ${leadFilter.agreement==='sent'?'selected':''}>נשלח הסכם</option>
      <option value="signed" ${leadFilter.agreement==='signed'?'selected':''}>הסכם חתום</option>
    </select>
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>סוג</th><th>שם</th><th>טלפון</th><th>עיר</th><th>מקור הגעה</th><th>סטטוס ליד</th><th>סטטוס הסכם</th><th>תאריכים</th><th>עסקים שהוצעו / למי נשלח</th><th>פעולות</th></tr></thead>
    <tbody>${rows || '<tr class="empty-row"><td colspan="10">לא נמצאו לידים תואמים</td></tr>'}</tbody>
  </table></div>`;
}

  const l = id? getLead(id) : null;
  const tagsVal = l? (l.tags||[]).join(', ') : '';
  openModal(`
    <div class="modal-header"><h3>${l?'עריכת ליד':'ליד חדש'}</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <form id="leadForm">
      <div class="field"><label>סוג ליד *</label>
        <select name="type" required>
          <option value="buyer" ${l&&l.type==='buyer'?'selected':''}>קונה</option>
          <option value="seller" ${l&&l.type==='seller'?'selected':''}>מוכר</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field"><label>שם מלא *</label><input name="name" required value="${esc((l&&l.name)||'')}"></div>
        <div class="field"><label>טלפון *</label><input name="phone" required value="${esc((l&&l.phone)||'')}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>עיר מגורים</label><input name="city" value="${esc((l&&l.city)||'')}"></div>
        <div class="field"><label>מקור הגעה</label><input name="source" value="${esc((l&&l.source)||'')}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>שם העסק (אם מוכר)</label><input name="businessName" value="${esc((l&&l.businessName)||'')}"></div>
        <div class="field"><label>טלפון העסק</label><input name="businessPhone" value="${esc((l&&l.businessPhone)||'')}"></div>
      </div>
      <div class="field"><label>כמה מילים על הבקשה</label><textarea name="requestSummary" rows="2">${esc((l&&l.requestSummary)||'')}</textarea></div>
      <div class="field"><label>תוכן השיחה</label><textarea name="conversationContent" rows="2">${esc((l&&l.conversationContent)||'')}</textarea></div>
      <div class="field"><label>מה סוכם</label><textarea name="agreedSummary" rows="2">${esc((l&&l.agreedSummary)||'')}</textarea></div>
      <div class="field"><label>איך ממשיכים</label><textarea name="nextSteps" rows="2">${esc((l&&l.nextSteps)||'')}</textarea></div>
      <div class="field-row">
        <div class="field"><label>סטטוס ליד</label>
          <select name="status">${LEAD_STATUSES.map(s=>`<option ${l&&l.status===s?'selected':''}>${esc(s)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>תאריך מעקב הבא</label><input type="date" name="nextFollowUpDate" value="${(l&&l.nextFollowUpDate)||''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>נשלח הסכם התקשרות?</label>
          <select name="agreementSent"><option ${l&&l.agreementSent==='לא'?'selected':''}>לא</option><option ${l&&l.agreementSent==='כן'?'selected':''}>כן</option></select>
        </div>
        <div class="field"><label>נחתם הסכם התקשרות?</label>
          <select name="agreementSigned"><option ${l&&l.agreementSigned==='לא'?'selected':''}>לא</option><option ${l&&l.agreementSigned==='כן'?'selected':''}>כן</option></select>
        </div>
      </div>
      <div class="field"><label>הערות פנימיות</label><textarea name="internalNotes" rows="2">${esc((l&&l.internalNotes)||'')}</textarea></div>
      <div class="field"><label>תגיות (מופרדות בפסיק)</label><input name="tags" value="${esc(tagsVal)}" placeholder="${TAGS_SUGGESTED.join(', ')}"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="this.closest('form').reset()">איפוס טופס</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">ביטול</button>
        <button type="submit" class="btn btn-primary">💾 שמירה</button>
      </div>
    </form>`);
  document.getElementById('leadForm').addEventListener('submit',(e)=>{
    e.preventDefault();
    const f=new FormData(e.target);
    const data=Object.fromEntries(f.entries());
    data.tags = data.tags? data.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
    if(id){
      Object.assign(l, data); l.updatedDate=nowISO();
    } else {
      DB.leads.push({id:uid('lead'), ...data, createdDate:nowISO(), updatedDate:nowISO()});
    }
    saveDB(); closeModal(); toast('הליד נשמר בהצלחה'); render();
  });
}

function deleteLead(id){
  const l=getLead(id); if(!l) return;
  const relatedMatches = matchesForBuyer(id);
  const relatedBiz = businessesForSeller(id);
  const hasLinks = relatedMatches.length>0 || relatedBiz.length>0;
  const msg = hasLinks
    ? 'לרשומה זו קיימות התאמות במערכת. מחיקה תסיר גם את הקשרים המשויכים אליה. האם להמשיך?'
    : 'האם אתה בטוח שברצונך למחוק את הרשומה?';
  confirmAction(msg, ()=>{
    DB.leads=DB.leads.filter(x=>x.id!==id);
    DB.matches=DB.matches.filter(m=>m.buyerId!==id);
    DB.businesses.forEach(b=>{ if(b.leadId===id) b.leadId=''; });
    saveDB(); toast('הרשומה נמחקה בהצלחה'); render();
  });
}

let bizFilter={search:'',status:'all',agreement:'all',drive:'all',offered:'all'};
function renderBusinessesScreen(){
  let list=DB.businesses.filter(b=>{
    if(bizFilter.status!=='all' && b.status!==bizFilter.status) return false;
    if(bizFilter.agreement==='signed' && b.agreementStatus!=='חתום') return false;
    if(bizFilter.agreement==='notsigned' && b.agreementStatus==='חתום') return false;
    if(bizFilter.drive==='yes' && !b.driveLink) return false;
    if(bizFilter.drive==='no' && b.driveLink) return false;
    if(bizFilter.offered==='yes' && matchesForBusiness(b.id).length===0) return false;
    if(bizFilter.offered==='no' && matchesForBusiness(b.id).length>0) return false;
    if(bizFilter.search){
      const s=bizFilter.search.toLowerCase();
      const hay=[b.name,b.city,b.field,b.price,b.status].join(' ').toLowerCase();
      if(!hay.includes(s)) return false;
    }
    return true;
  }).sort((a,b)=>b.updatedDate.localeCompare(a.updatedDate));

  const rows=list.map(b=>{
    const offeredTo = matchesForBusiness(b.id).length;
    const seller = b.leadId? getLead(b.leadId) : null;
    return `<tr>
      <td>${esc(b.name)}</td>
      <td>${esc(b.field)}</td>
      <td>${esc(b.city)}</td>

      <td>${seller? esc(seller.name) : '<span style="color:var(--muted);">לא משויך</span>'}</td>
      <td>${badge(b.status)}</td>
      <td>${badge(b.agreementStatus||'אין הסכם')}</td>
      <td>הוצע ל-<span class="count-pill">${offeredTo}</span> קונים</td>
      <td>${b.driveLink? `<button class="btn btn-outline btn-sm" onclick="window.open('${esc(b.driveLink)}','_blank')">📁 פתח מחיצה</button>` : '—'}</td>

        <button class="btn btn-danger btn-sm" onclick="deleteBiz('${b.id}')">מחק</button>

  <div class="screen-title"><h2>עסקים למכירה</h2><button class="btn btn-gold" onclick="openBizForm()">+ עסק חדש</button></div>
  ${filterBanner()}

    <select id="bizStatusFilter">
      <option value="all" ${bizFilter.status==='all'?'selected':''}>כל הסטטוסים</option>
      ${BUSINESS_STATUSES.map(s=>`<option value="${esc(s)}" ${bizFilter.status===s?'selected':''}>${esc(s)}</option>`).join('')}
    </select>
    <select id="bizAgreementFilter">
      <option value="all" ${bizFilter.agreement==='all'?'selected':''}>כל סטטוסי ההסכם</option>
      <option value="signed" ${bizFilter.agreement==='signed'?'selected':''}>הסכם חתום</option>
      <option value="notsigned" ${bizFilter.agreement==='notsigned'?'selected':''}>ללא הסכם חתום</option>
    </select>
    <select id="bizDriveFilter">
      <option value="all" ${bizFilter.drive==='all'?'selected':''}>כל העסקים (דרייב)</option>
      <option value="yes" ${bizFilter.drive==='yes'?'selected':''}>עם קישור לדרייב</option>

    </select>
    <select id="bizOfferedFilter">
      <option value="all" ${bizFilter.offered==='all'?'selected':''}>כל העסקים (הצעות)</option>

let matchFilter={buyer:'all',business:'all',status:'all',interest:'all',interestGroup:'all',openOnly:false};
function renderMatchesScreen(){
  let list=DB.matches.filter(m=>{
    if(matchFilter.buyer!=='all' && m.buyerId!==matchFilter.buyer) return false;
    if(matchFilter.business!=='all' && m.businessId!==matchFilter.business) return false;
    if(matchFilter.status!=='all' && m.status!==matchFilter.status) return false;
    if(matchFilter.interest!=='all' && m.interestLevel!==matchFilter.interest) return false;
    if(matchFilter.interestGroup==='hot' && !['חם','חם מאוד'].includes(m.interestLevel)) return false;
    if(matchFilter.openOnly && ['עסקה נסגרה','עסקה ירדה','לא מעוניין'].includes(m.status)) return false;
    return true;
  }).sort((a,b)=>(b.proposedDate||'').localeCompare(a.proposedDate||''));

  const rows=list.map(m=>{
    const hot = ['חם','חם מאוד'].includes(m.interestLevel);
    const needsFollow = m.nextFollowUpDate && (isOverdue(m.nextFollowUpDate)||isToday(m.nextFollowUpDate));
    const biz = getBusiness(m.businessId);
    const seller = biz && biz.leadId? getLead(biz.leadId) : null;
    return `<tr style="${hot?'background:#fff6e0;':''}">
      <td>${hot?'🔥 ':''}${esc(leadLabel(m.buyerId))}</td>
      <td>${esc(bizLabel(m.businessId))}</td>
      <td>${seller? esc(seller.name) : '<span style="color:var(--muted);">—</span>'}</td>
      <td>${fmtDate(m.proposedDate)}</td>
      <td>
        <select onchange="quickUpdateMatchStatus('${m.id}', this.value)" style="padding:4px 6px;font-size:12px;">
          ${MATCH_STATUSES.map(s=>`<option ${m.status===s?'selected':''}>${esc(s)}</option>`).join('')}
        </select>
      </td>
      <td>${badge(m.interestLevel)}</td>
      <td class="wrap">${esc(m.nextAction)||'—'}</td>
      <td>${needsFollow?'⚠️ ':''}${fmtDate(m.nextFollowUpDate)}</td>

function downloadFile(filename, content, mime){
  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
}
function exportJSON(){
  downloadFile('bsd-crm-backup-'+todayISO()+'.json', JSON.stringify(DB,null,2), 'application/json');
  toast('קובץ הגיבוי הורד בהצלחה');
}
function importJSON(evt){
  const file=evt.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.leads||!data.businesses) throw new Error('invalid');
      DB=data; saveDB(); toast('הנתונים יובאו בהצלחה'); render();
    }catch(err){ alert('קובץ לא תקין. יש לוודא שזהו קובץ גיבוי JSON תקני של המערכת.'); }
  };
  reader.readAsText(file);
}
function toCSV(rows){
  if(!rows.length) return '';
  const headers=Object.keys(rows[0]);
  const esc2=(v)=>{ if(v===undefined||v===null) v=''; if(Array.isArray(v)) v=v.join('; '); v=String(v).replace(/"/g,'""'); return `"${v}"`; };
  return [headers.join(','), ...rows.map(r=>headers.map(h=>esc2(r[h])).join(','))].join('\n');
}
function exportCSV(entity){
  const rows=DB[entity];
  if(!rows.length){ toast('אין נתונים לייצוא'); return; }
  const csv='\uFEFF'+toCSV(rows);
  downloadFile('bsd-'+entity+'-'+todayISO()+'.csv', csv, 'text/csv;charset=utf-8;');
  toast('קובץ ה-CSV הורד בהצלחה');
}

      + '</div>';
  }
});
try{
  loadDB();
  document.documentElement.style.setProperty('--buyer-bg', DB.settings.buyerColor||'#EAF2FB');

  const dashBtn=document.querySelector('.nav-btn[data-screen="dashboard"]'); if(dashBtn) dashBtn.classList.add('active');
  render();
  if(!storageAvailable){
    setTimeout(()=>{ toast('⚠️ הדפדפן חוסם שמירה מקומית בקובץ זה - שינויים לא יישמרו לאחר סגירה. מומלץ לפתוח את הקובץ מתוך Chrome.'); }, 400);

}catch(initErr){

  if(app) app.innerHTML = '<div style="max-width:480px;margin:40px auto;text-align:center;background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);">'
