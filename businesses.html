<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BSD CRM - עסקים למכירה</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .wrap{padding:24px 28px 60px;max-width:1300px;margin:0 auto;}
  .nav a{color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;}
  .nav a.active{background:rgba(255,255,255,.12);color:#fff;font-weight:700;}
  .nav a:hover{color:#fff;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .toolbar h2{margin:0;color:var(--navy);font-size:1.3rem;}
  .btn{border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:.85rem;cursor:pointer;font-weight:700;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-ghost{background:#fff;border:1px solid #d8d3c4;color:var(--navy);}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters input, .filters select{padding:9px 12px;border:1px solid #d8d3c4;border-radius:8px;font-family:inherit;font-size:.85rem;}
  .filters input[type=text]{min-width:220px;}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.06);}
  thead th{background:var(--navy);color:#fff;padding:12px 14px;font-size:.8rem;text-align:right;white-space:nowrap;}
  tbody td{padding:11px 14px;border-bottom:1px solid #f0ede4;font-size:.85rem;}
  tbody tr:hover{background:#faf8f2;}
  .badge{padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700;background:#eef1f6;color:var(--navy);}
  .agr-badge{padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700;white-space:nowrap;}
  .agr-none{background:#f1f1f1;color:#777;}
  .agr-sent{background:#fdeccb;color:#8a5a10;}
  .agr-signed{background:#dff0e4;color:#245c40;}
  tbody tr.row-signed{background:#d9f2e3 !important;border-right:10px solid #2e9e5b;}
  tbody tr.row-signed td{color:#1a5c38 !important;font-weight:600;}
  tbody tr.row-signed:hover{background:#c8ecd6 !important;}
  tbody tr.row-sent{background:#ffe9cc !important;border-right:10px solid #e0932e;}
  tbody tr.row-sent td{color:#7a4a00 !important;font-weight:600;}
  tbody tr.row-sent:hover{background:#ffdcae !important;}
  tbody tr.row-removed{background:#fbdcdc !important;border-right:10px solid #c94a4a;}
  tbody tr.row-removed td{color:#7a1f1f !important;font-weight:600;}
  tbody tr.row-removed:hover{background:#f7c8c8 !important;}
  tbody tr.row-sold{background:#2563c9 !important;border-right:10px solid #143a72;}
  tbody tr.row-sold td{color:#fff !important;font-weight:700;}
  tbody tr.row-sold:hover{background:#1d54ac !important;}
  .row-actions button{border:none;background:none;cursor:pointer;font-size:.9rem;padding:4px 6px;}
  .empty-row td{text-align:center;color:#999;padding:30px;}
  .price{font-weight:700;color:#245c40;}

  .overlay{position:fixed;inset:0;background:rgba(14,27,52,.55);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;z-index:50;padding:40px 20px;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:680px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .modal h3{margin:0 0 18px;color:var(--navy);border-right:4px solid var(--gold);padding-right:10px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid .full{grid-column:1/3;}
  .field label{display:block;font-size:.78rem;color:#666;margin-bottom:4px;}
  .field input, .field select, .field textarea{width:100%;padding:9px 11px;border:1px solid #d8d3c4;border-radius:8px;font-family:inherit;font-size:.85rem;}
  .field textarea{resize:vertical;min-height:60px;}
  .section-h{grid-column:1/3;font-size:.8rem;font-weight:700;color:var(--gold);margin:10px 0 -4px;text-transform:uppercase;letter-spacing:.5px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .toast{position:fixed;bottom:24px;left:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:.85rem;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.3);}
</style>
</head>
<body>

<div class="bsd-header">
  <a href="app.html" style="text-decoration:none;color:inherit;"><div class="brand">BSD CRM <small>BSD Business Brokers Israel</small></div></a>
  <div id="headerUserInfo" style="color:#ffdd33;font-size:1.15rem;font-weight:800;white-space:nowrap;margin-inline-start:16px;align-self:center;border:2px solid #ffdd33;border-radius:10px;padding:6px 14px;text-shadow:0 0 8px rgba(255,221,51,.6);"></div>
        <div class="nav" style="display:flex;gap:6px;">
    <a href="app.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">לוח בקרה</a>
    <a href="businesses.html" style="background:rgba(255,255,255,.12);color:#fff;font-weight:700;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">עסקים למכירה</a>
    <a href="leads.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">קונים ומשקיעים</a>
    <a href="matches.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">התאמות</a>
    <a href="tasks.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">משימות</a>
    <a id="navUsersLink" href="users.html" style="color:#cfd6e6;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.85rem;">משתמשים</a>
  </div>
  <button class="btn btn-ghost" onclick="bsdLogout()" style="color:#fff;border-color:rgba(255,255,255,.5);background:transparent;">יציאה</button>
</div>

<div class="wrap">
  <div class="toolbar">
    <h2>עסקים למכירה</h2>
    <button class="btn btn-primary" onclick="openBizForm(null)">+ עסק חדש</button>
  </div>

  <div class="filters">
    <input type="text" id="fSearch" placeholder="חיפוש לפי שם עסק, עיר, תחום, מחיר, תיאור...">
    <select id="fStatus"><option value="all">כל הסטטוסים</option></select>
    <select id="fField"><option value="all">כל התחומים</option></select>
    <select id="fAgreement">
      <option value="all">כל סטטוסי ההסכם</option>
      <option value="אין הסכם">אין הסכם</option>
      <option value="נשלח הסכם לחתימה">נשלח הסכם לחתימה</option>
      <option value="יש הסכם חתום">יש הסכם חתום</option>
    </select>
    <select id="fCreatedBy"><option value="all">כל מי שהזין</option></select>
    <select id="fSort">
      <option value="updated_desc">עודכן לאחרונה</option>
      <option value="created_desc">נוצר לאחרונה</option>
      <option value="price_desc">מחיר (גבוה לנמוך)</option>
      <option value="name_asc">שם (א-ת)</option>
      <option value="agreement_asc">סטטוס הסכם</option>
    </select>
  </div>

  <div style="overflow-x:auto;">
  <table>
    <thead>
      <tr>
        <th>שם פנימי</th><th>טלפון בעלים</th><th>תחום</th><th>עיר</th><th>מחיר מבוקש</th><th>סטטוס</th><th>הוזן ע"י</th><th>מטופל ע"י</th><th>סטטוס הסכם</th><th>נוצר</th><th>עודכן</th><th>פעולות</th>
      </tr>
    </thead>
    <tbody id="bizBody">
      <tr class="empty-row"><td colspan="11">טוען...</td></tr>
    </tbody>
  </table>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBox"></div></div>
<div id="toastBox"></div>

<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script>
let ALL_BIZ = [];
let ALL_SELLERS = [];
let ALL_USERS = [];

function esc(s){ if(s===undefined||s===null) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleDateString('he-IL'); }catch(e){ return iso; } }
function fmtDateTime(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleString('he-IL'); }catch(e){ return iso; } }
function fmtMoney(n){ if(n===null||n===undefined) return '—'; return '₪' + Number(n).toLocaleString('he-IL'); }
function toast(msg){
  const box = document.getElementById('toastBox');
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  box.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modalBox').innerHTML = '';
}

async function loadLookups(){
  const { data: sellers } = await window.supabaseClient.from('leads').select('id, full_name, phone').eq('type','seller');
  ALL_SELLERS = sellers || [];
  const { data: users } = await window.supabaseClient.from('profiles').select('id, full_name, email, role').eq('status','active');
  ALL_USERS = users || [];
}

let CURRENT_PROFILE = null;

async function loadBusinesses(){
  let q = window.supabaseClient
    .from('businesses')
    .select('*')
    .order('updated_at', { ascending: false });
  if (CURRENT_PROFILE && CURRENT_PROFILE.role === 'agent') {
    q = q.eq('created_by', CURRENT_PROFILE.id);
  }
  const { data, error } = await q;
  if (error){ toast('שגיאה בטעינה: ' + error.message); return; }
  ALL_BIZ = data || [];
  populateFilters();
  renderTable();
}

function populateFilters(){
  const statusSel = document.getElementById('fStatus');
  const fieldSel = document.getElementById('fField');
  const createdBySel = document.getElementById('fCreatedBy');
  const existingS = new Set(Array.from(statusSel.options).map(o=>o.value));
  const existingF = new Set(Array.from(fieldSel.options).map(o=>o.value));
  const existingC = new Set(Array.from(createdBySel.options).map(o=>o.value));
  [...new Set(ALL_BIZ.map(b=>b.status).filter(Boolean))].forEach(s=>{
    if (!existingS.has(s)){ const o=document.createElement('option'); o.value=s; o.textContent=s; statusSel.appendChild(o); }
  });
  [...new Set(ALL_BIZ.map(b=>b.field).filter(Boolean))].forEach(s=>{
    if (!existingF.has(s)){ const o=document.createElement('option'); o.value=s; o.textContent=s; fieldSel.appendChild(o); }
  });
  [...new Set(ALL_BIZ.map(b=>b.created_by).filter(Boolean))].forEach(uid=>{
    if (!existingC.has(uid)){ const o=document.createElement('option'); o.value=uid; o.textContent=userName(uid); createdBySel.appendChild(o); }
  });
}

function userName(id){
  const u = ALL_USERS.find(x=>x.id===id);
  return u ? (u.full_name && u.full_name.trim() ? u.full_name : u.email) : '—';
}
function creatorColor(id){
  const u = ALL_USERS.find(x=>x.id===id);
  if (!u) return null;
  if (u.role === 'agent') return '#e6c200'; // צהוב זוהר - סוכן
  if (u.role === 'agent_authorized') return '#2ecc40'; // ירוק זוהר - סוכן מורשה
  return null;
}
function sellerName(id){
  const s = ALL_SELLERS.find(x=>x.id===id);
  return s ? s.full_name : '—';
}
function agreementBadge(status){
  const s = status || 'אין הסכם';
  const cls = s === 'יש הסכם חתום' ? 'agr-signed' : (s === 'נשלח הסכם לחתימה' ? 'agr-sent' : 'agr-none');
  return `<span class="agr-badge ${cls}">${esc(s)}</span>`;
}

function renderTable(){
  const search = document.getElementById('fSearch').value.trim().toLowerCase();
  const status = document.getElementById('fStatus').value;
  const field = document.getElementById('fField').value;
  const agreement = document.getElementById('fAgreement').value;
  const createdBy = document.getElementById('fCreatedBy').value;
  const sort = document.getElementById('fSort').value;

  let rows = ALL_BIZ.filter(b=>{
    if (status !== 'all' && b.status !== status) return false;
    if (field !== 'all' && b.field !== field) return false;
    if (agreement !== 'all' && (b.agreement_status || 'אין הסכם') !== agreement) return false;
    if (createdBy !== 'all' && b.created_by !== createdBy) return false;
    if (search){
      const hay = [b.internal_name, b.owner_name, b.owner_phone, b.city, b.field, b.category, b.subcategory, b.status, String(b.asking_price||''),
        b.short_description, b.sale_reason, b.region, b.address, b.source, b.notes, b.id_number, b.entity_type, b.removal_reason, b.sold_to].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  rows.sort((a,b)=>{
    if (sort === 'price_desc') return (b.asking_price||0) - (a.asking_price||0);
    if (sort === 'name_asc') return (a.internal_name||'').localeCompare(b.internal_name||'', 'he');
    if (sort === 'created_desc') return new Date(b.created_at) - new Date(a.created_at);
    if (sort === 'agreement_asc') return (a.agreement_status||'').localeCompare(b.agreement_status||'', 'he');
    return new Date(b.updated_at) - new Date(a.updated_at);
  });

  const body = document.getElementById('bizBody');
  if (rows.length === 0){
    body.innerHTML = '<tr class="empty-row"><td colspan="12">לא נמצאו עסקים</td></tr>';
    return;
  }
  body.innerHTML = rows.map(b=>{
    const agrStatus = b.agreement_status || 'אין הסכם';
    const rowCls = b.listing_status === 'sold' ? 'row-sold'
      : b.listing_status === 'removed' ? 'row-removed'
      : agrStatus === 'יש הסכם חתום' ? 'row-signed' : (agrStatus === 'נשלח הסכם לחתימה' ? 'row-sent' : 'row-none');
    const statusEmoji = rowCls === 'row-sold' ? '🔵 ' : rowCls === 'row-removed' ? '⛔ ' : rowCls === 'row-signed' ? '✅ ' : (rowCls === 'row-sent' ? '🟠 ' : '');
    return `
    <tr class="${rowCls}">
      <td data-label="שם פנימי"><div class="primary-name" style="font-weight:700;">${statusEmoji}${esc(b.internal_name)}</div>${b.owner_name?`<div class="sub-name" style="font-size:.75rem;color:#888;">${esc(b.owner_name)}</div>`:''}${b.internal_code?`<div class="sub-name" style="font-size:.72rem;color:#999;">${esc(b.internal_code)}</div>`:''}</td>
      <td data-label="טלפון בעלים" class="phone-cell" dir="ltr" style="text-align:right;unicode-bidi:isolate;">${b.owner_phone ? `<a href="tel:${esc(b.owner_phone)}" style="color:inherit;text-decoration:none;">📞 ${esc(b.owner_phone)}</a>` : '—'}</td>
      <td data-label="תחום">${esc(b.field||'—')}</td>
      <td data-label="עיר">${esc(b.city||'—')}</td>
      <td class="price" data-label="מחיר מבוקש">${fmtMoney(b.asking_price)}</td>
      <td data-label="סטטוס"><span class="badge">${esc(b.status||'—')}</span></td>
      <td data-label="הוזן ע&quot;י">${b.created_by ? `<b style="color:${creatorColor(b.created_by) || '#333'};">${esc(userName(b.created_by))}</b>` : 'לא ידוע'}</td>
      <td data-label="מטופל ע&quot;י">${b.handled_by ? esc(userName(b.handled_by)) : '—'}</td>
      <td data-label="סטטוס הסכם">${agreementBadge(b.agreement_status)}</td>
      <td data-label="נוצר">${fmtDate(b.created_at)}</td>
      <td data-label="עודכן">${fmtDate(b.updated_at)}</td>
      <td class="row-actions" data-label="">
        ${canEditRecord(b.created_by) ? `<button title="ערוך" onclick="openBizForm('${b.id}')">✏️</button>` : ''}
        <button title="הערות" onclick="openNotesPanel('businesses','${b.id}','${esc((b.internal_name||'רשומה').replace(/'/g,''))}')">📝</button>
        <button title="שלח הסכם" onclick="sendAgreementForBiz('${b.id}')">📄</button>
        ${canEditRecord(b.created_by) ? `<button title="מחק" onclick="deleteBiz('${b.id}')">🗑️</button>` : ''}
      </td>
    </tr>
  `;
  }).join('');
}

function canEditRecord(createdBy){
  if (!CURRENT_PROFILE) return false;
  if (CURRENT_PROFILE.role === 'admin' || CURRENT_PROFILE.role === 'manager') return true;
  return createdBy === CURRENT_PROFILE.id;
}

['fSearch','fStatus','fField','fAgreement','fCreatedBy','fSort'].forEach(id=>{
  document.getElementById(id).addEventListener('input', renderTable);
  document.getElementById(id).addEventListener('change', renderTable);
});

function fieldRow(id,label,value,type='text'){
  return `<div class="field"><label>${label}</label><input type="${type}" id="${id}" value="${esc(value||'')}"></div>`;
}
function textareaRow(id,label,value){
  return `<div class="field full"><label>${label}</label><textarea id="${id}">${esc(value||'')}</textarea></div>`;
}
function sellerOptions(selected){
  return '<option value="">— ללא —</option>' + ALL_SELLERS.map(s=>
    `<option value="${s.id}" ${s.id===selected?'selected':''}>${esc(s.full_name)}</option>`).join('');
}
function userOptions(selected){
  return '<option value="">— ללא —</option>' + ALL_USERS.map(u=>{
    const label = u.full_name && u.full_name.trim() ? u.full_name : u.email;
    return `<option value="${u.id}" ${u.id===selected?'selected':''}>${esc(label)}</option>`;
  }).join('');
}

function toggleListingFields(){
  const v = document.getElementById('listing_status').value;
  document.getElementById('removalReasonField').style.display = v === 'removed' ? 'block' : 'none';
  document.getElementById('soldToField').style.display = v === 'sold' ? 'block' : 'none';
}

function openBizForm(id){
  const biz = id ? ALL_BIZ.find(b=>b.id===id) : null;
  const modal = document.getElementById('modalBox');
  modal.innerHTML = `
    <h3>${biz ? 'עריכת עסק' : 'עסק חדש'}</h3>
    <form id="bizForm">
      <div class="form-grid">
        <div class="section-h">זיהוי</div>
        <div class="field full" style="background:#f7f5ef;border-radius:8px;padding:10px 12px;font-size:.8rem;color:#665;">
          מספר מזהה פנימי: <b>${biz?.internal_code ? esc(biz.internal_code) : 'ייווצר אוטומטית עם השמירה'}</b>
          ${biz ? ` · הוזן ע"י: <b>${esc(userName(biz.created_by))}</b> בתאריך ${fmtDate(biz.created_at)}` : ''}
        </div>
        ${fieldRow('internal_name','שם העסק (פנימי)', biz?.internal_name)}
        <div class="field">
          <label>שם אנונימי להצגה</label>
          <div style="display:flex;gap:6px;">
            <input type="text" id="anonymous_name" value="${esc(biz?.anonymous_name)}" style="flex:1;">
            <button type="button" class="btn btn-ghost" style="white-space:nowrap;padding:0 12px;" onclick="suggestAnonymousName()">💡 הצע</button>
          </div>
        </div>
        ${fieldRow('website','אתר אינטרנט', biz?.website, 'text')}

        <div class="section-h">פרטי בעל העסק</div>
        ${fieldRow('owner_name','שם הבעלים', biz?.owner_name)}
        ${fieldRow('owner_phone','טלפון הבעלים', biz?.owner_phone)}
        ${fieldRow('owner_email','אימייל הבעלים', biz?.owner_email, 'email')}
        ${fieldRow('id_number','ת.ז / ח.פ', biz?.id_number)}
        ${fieldRow('entity_type','חברה / עוסק מורשה', biz?.entity_type)}

        <div class="section-h">תיאור</div>
        <div class="field full">
          <label>תיאור קצר של העסק</label>
          <div style="display:flex;gap:6px;align-items:flex-start;">
            <textarea id="short_description" style="flex:1;">${esc(biz?.short_description)}</textarea>
            <button type="button" class="btn btn-ghost" style="white-space:nowrap;padding:0 12px;height:38px;" onclick="suggestShortDescription()">💡 הצע</button>
          </div>
        </div>

        <div class="section-h">סיווג ומיקום</div>
        ${fieldRow('field','תחום פעילות', biz?.field)}
        ${fieldRow('category','קטגוריה', biz?.category)}
        ${fieldRow('subcategory','תת-קטגוריה', biz?.subcategory)}
        ${fieldRow('city','עיר', biz?.city)}
        ${fieldRow('region','אזור בארץ', biz?.region)}
        ${fieldRow('address','כתובת', biz?.address)}

        <div class="section-h">נתונים כספיים</div>
        ${fieldRow('asking_price','מחיר מבוקש', biz?.asking_price, 'number')}
        ${fieldRow('annual_revenue','מחזור שנתי', biz?.annual_revenue, 'number')}
        ${fieldRow('operating_profit','רווח תפעולי', biz?.operating_profit, 'number')}
        ${fieldRow('net_profit','רווח נקי', biz?.net_profit, 'number')}
        ${fieldRow('employees_count','מספר עובדים', biz?.employees_count, 'number')}
        ${fieldRow('years_active','שנות פעילות', biz?.years_active, 'number')}

        <div class="section-h">ניהול ומעקב</div>
        ${fieldRow('sale_reason','סיבת מכירה', biz?.sale_reason)}
        ${fieldRow('status','סטטוס העסק', biz?.status)}
        ${fieldRow('discretion_level','רמת דיסקרטיות', biz?.discretion_level)}
        ${fieldRow('source','מקור העסק', biz?.source)}
        <div class="field"><label>סטטוס הסכם</label>
          <select id="agreement_status">
            <option value="אין הסכם" ${(!biz?.agreement_status || biz.agreement_status==='אין הסכם')?'selected':''}>אין הסכם</option>
            <option value="נשלח הסכם לחתימה" ${biz?.agreement_status==='נשלח הסכם לחתימה'?'selected':''}>נשלח הסכם לחתימה</option>
            <option value="יש הסכם חתום" ${biz?.agreement_status==='יש הסכם חתום'?'selected':''}>יש הסכם חתום</option>
          </select>
        </div>
        <div class="field"><label>מטפל בעסק</label><select id="handled_by">${userOptions(biz?.handled_by)}</select></div>

        <div class="section-h">מצב מדף</div>
        <div class="field">
          <label>סטטוס מכירה</label>
          <select id="listing_status" onchange="toggleListingFields()">
            <option value="active" ${(!biz?.listing_status || biz.listing_status==='active')?'selected':''}>פעיל למכירה</option>
            <option value="removed" ${biz?.listing_status==='removed'?'selected':''}>עסקה לא פעילה</option>
            <option value="sold" ${biz?.listing_status==='sold'?'selected':''}>נמכר</option>
          </select>
        </div>
        <div class="field" id="removalReasonField" style="display:${biz?.listing_status==='removed'?'block':'none'};">
          <label>סיבת ההורדה</label>
          <input type="text" id="removal_reason" value="${esc(biz?.removal_reason)}">
        </div>
        <div class="field" id="soldToField" style="display:${biz?.listing_status==='sold'?'block':'none'};">
          <label>נמכר למי (כמה מילים)</label>
          <input type="text" id="sold_to" value="${esc(biz?.sold_to)}">
        </div>

        <div class="section-h">הערות</div>
        <div class="field full">${textareaRow('notes','הערות חופשיות', biz?.notes)}</div>
      </div>

      ${biz ? `
      <div class="section-h" style="margin-top:14px;">קבצים מצורפים</div>
      <div class="field full">
        <input type="file" id="bizFileInput">
        <button type="button" class="btn btn-ghost" style="margin-top:6px;" onclick="uploadBizFile('${biz.id}')">📎 העלה קובץ</button>
        <div id="bizFilesList" style="margin-top:10px;font-size:.82rem;">טוען קבצים...</div>
      </div>
      ` : `
      <div class="section-h" style="margin-top:14px;">קבצים מצורפים</div>
      <div class="field full" style="color:#999;font-size:.8rem;">שמור את העסק תחילה, ואז תוכל לצרף קבצים בעריכה.</div>
      `}

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">ביטול</button>
        <button type="submit" class="btn btn-primary">שמירה</button>
      </div>
    </form>
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('bizForm').dataset.bizId = biz ? biz.id : '';
  document.getElementById('bizForm').addEventListener('submit', saveBiz);
  if (biz) loadBizFiles(biz.id);
}

const MAX_FILE_MB = 20;
const BIZ_FILES_BUCKET = 'business-files';

async function loadBizFiles(bizId){
  const box = document.getElementById('bizFilesList');
  const { data, error } = await window.supabaseClient.storage.from(BIZ_FILES_BUCKET).list(bizId, { sortBy: { column: 'created_at', order: 'desc' } });
  if (error){ box.innerHTML = '<span style="color:#b3402c;">שגיאה בטעינת קבצים: ' + esc(error.message) + '</span>'; return; }
  if (!data || data.length === 0){ box.innerHTML = '<span style="color:#999;">אין קבצים מצורפים עדיין</span>'; return; }
  box.innerHTML = data.map(f => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede4;">
      <span>📄 ${esc(f.name)}</span>
      <span>
        <button type="button" class="btn btn-ghost" style="padding:2px 10px;font-size:.75rem;" onclick="downloadBizFile('${bizId}','${esc(f.name)}')">הורדה</button>
        <button type="button" class="btn btn-ghost" style="padding:2px 10px;font-size:.75rem;color:#b3402c;" onclick="deleteBizFile('${bizId}','${esc(f.name)}')">מחק</button>
      </span>
    </div>`).join('');
}

async function uploadBizFile(bizId){
  const input = document.getElementById('bizFileInput');
  const file = input.files[0];
  if (!file){ toast('בחר קובץ תחילה'); return; }
  if (file.size > MAX_FILE_MB * 1024 * 1024){ toast(`הקובץ גדול מדי (מקסימום ${MAX_FILE_MB}MB)`); return; }
  const path = `${bizId}/${Date.now()}_${file.name}`;
  const { error } = await window.supabaseClient.storage.from(BIZ_FILES_BUCKET).upload(path, file);
  if (error){ toast('שגיאה בהעלאה: ' + error.message); return; }
  toast('הקובץ הועלה בהצלחה');
  input.value = '';
  loadBizFiles(bizId);
}

async function downloadBizFile(bizId, fileName){
  const { data, error } = await window.supabaseClient.storage.from(BIZ_FILES_BUCKET).createSignedUrl(`${bizId}/${fileName}`, 60);
  if (error){ toast('שגיאה: ' + error.message); return; }
  window.open(data.signedUrl, '_blank');
}

function closeNotesPanel(){
  const ov = document.getElementById('notesOverlay');
  if (ov) ov.remove();
}

async function openNotesPanel(tableName, recordId, recordLabel){
  closeNotesPanel();
  const overlay = document.createElement('div');
  overlay.id = 'notesOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(14,27,52,.55);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;z-index:95;padding:40px 20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:14px;max-width:560px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.4);">
      <h3 style="margin:0 0 16px;color:var(--navy);border-right:4px solid var(--gold);padding-right:10px;">הערות - ${esc(recordLabel)}</h3>
      <div id="notesList" style="max-height:300px;overflow-y:auto;margin-bottom:16px;">טוען...</div>
      <textarea id="newNoteText" placeholder="הוסף הערה..." style="width:100%;min-height:70px;padding:9px 11px;border:1px solid #d8d3c4;border-radius:8px;font-family:inherit;font-size:.85rem;margin-bottom:10px;"></textarea>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closeNotesPanel()" style="background:#fff;border:1px solid #d8d3c4;color:var(--navy);padding:9px 18px;border-radius:8px;font-family:inherit;cursor:pointer;">סגירה</button>
        <button onclick="addNote('${tableName}','${recordId}')" style="background:var(--gold);color:#1c2333;border:none;padding:9px 18px;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;">הוסף הערה</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  await loadNotes(tableName, recordId);
}

async function loadNotes(tableName, recordId){
  const { data } = await window.supabaseClient
    .from('record_notes')
    .select('id, note_text, created_at, author_id')
    .eq('table_name', tableName).eq('record_id', recordId)
    .order('created_at', { ascending: false });
  const list = document.getElementById('notesList');
  if (!list) return;
  if (!data || data.length === 0){
    list.innerHTML = '<div style="color:#999;text-align:center;padding:14px;">אין הערות עדיין</div>';
    return;
  }
  list.innerHTML = data.map(n => `
    <div style="border-bottom:1px solid #f0ede4;padding:10px 0;">
      <div style="font-size:.78rem;color:#999;margin-bottom:3px;">
        <b style="color:${creatorColor(n.author_id) || 'var(--navy)'};">${esc(userName(n.author_id))}</b> · ${fmtDateTime(n.created_at)}
      </div>
      <div style="font-size:.88rem;color:#333;white-space:pre-wrap;">${esc(n.note_text)}</div>
    </div>`).join('');
}

async function addNote(tableName, recordId){
  const text = document.getElementById('newNoteText').value.trim();
  if (!text){ toast('נא להזין טקסט הערה'); return; }
  const { error } = await window.supabaseClient.from('record_notes').insert({
    table_name: tableName, record_id: recordId,
    author_id: CURRENT_PROFILE ? CURRENT_PROFILE.id : null,
    note_text: text
  });
  if (error){ toast('שגיאה בשמירת ההערה: ' + error.message); return; }
  document.getElementById('newNoteText').value = '';
  await loadNotes(tableName, recordId);
}

async function deleteBizFile(bizId, fileName){
  if (!confirm('למחוק קובץ זה?')) return;
  const { error } = await window.supabaseClient.storage.from(BIZ_FILES_BUCKET).remove([`${bizId}/${fileName}`]);
  if (error){ toast('שגיאה במחיקה: ' + error.message); return; }
  toast('הקובץ נמחק');
  loadBizFiles(bizId);
}

function normalizeWebsite(url){
  if (!url) return null;
  url = url.trim();
  if (!url) return null;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  return url;
}

function suggestAnonymousName(){
  const field = document.getElementById('field').value.trim();
  const region = document.getElementById('region').value.trim();
  const city = document.getElementById('city').value.trim();
  const years = parseInt(document.getElementById('years_active').value) || 0;
  const revenue = parseFloat(document.getElementById('annual_revenue').value) || 0;

  const area = region || city || 'מרכז הארץ';
  const ageDesc = years >= 15 ? 'ותיק' : (years >= 5 ? 'יציב' : 'צעיר וצומח');
  const sizeDesc = revenue >= 3000000 ? 'רווחי בהיקף משמעותי' : (revenue >= 800000 ? 'רווחי' : 'בעל פוטנציאל צמיחה');
  const fieldDesc = field || 'עסק';

  const suggestion = `${fieldDesc} ${ageDesc}, ${sizeDesc}, באזור ${area}`;
  document.getElementById('anonymous_name').value = suggestion;
  toast('הוצע כינוי - ניתן לערוך לפני השמירה');
}

function suggestShortDescription(){
  const field = document.getElementById('field').value.trim();
  const category = document.getElementById('category').value.trim();
  const years = parseInt(document.getElementById('years_active').value) || 0;
  const employees = parseInt(document.getElementById('employees_count').value) || 0;
  const region = document.getElementById('region').value.trim();
  const city = document.getElementById('city').value.trim();
  const area = region || city;

  let parts = [];
  parts.push(field ? `עסק בתחום ${field}` : 'עסק');
  if (category) parts.push(`בקטגוריית ${category}`);
  if (years) parts.push(`הפעיל כ-${years} שנים`);
  if (employees) parts.push(`ומעסיק כ-${employees} עובדים`);
  if (area) parts.push(`הממוקם באזור ${area}`);

  const suggestion = parts.join(', ') + '.';
  document.getElementById('short_description').value = suggestion;
  toast('הוצע תיאור על בסיס הנתונים בטופס - ניתן לערוך לפני השמירה');
}

async function saveBiz(e){
  e.preventDefault();
  const form = e.target;
  const bizId = form.dataset.bizId;
  const g = id => document.getElementById(id) ? document.getElementById(id).value : null;
  const num = v => v === '' || v === null ? null : Number(v);

  const payload = {
    internal_name: g('internal_name'),
    anonymous_name: g('anonymous_name'),
    website: normalizeWebsite(g('website')),
    short_description: g('short_description'),
    owner_name: g('owner_name'), owner_phone: g('owner_phone'), owner_email: g('owner_email'),
    id_number: g('id_number'), entity_type: g('entity_type'),
    notes: g('notes'),
    field: g('field'), category: g('category'), subcategory: g('subcategory'),
    city: g('city'), region: g('region'), address: g('address'),
    asking_price: num(g('asking_price')), annual_revenue: num(g('annual_revenue')),
    operating_profit: num(g('operating_profit')), net_profit: num(g('net_profit')),
    employees_count: num(g('employees_count')), years_active: num(g('years_active')),
    sale_reason: g('sale_reason'), status: g('status'),
    discretion_level: g('discretion_level'), source: g('source'),
    agreement_status: g('agreement_status'), handled_by: g('handled_by') || null,
    listing_status: g('listing_status'),
    removal_reason: g('listing_status') === 'removed' ? g('removal_reason') : null,
    sold_to: g('listing_status') === 'sold' ? g('sold_to') : null
  };

  if (!payload.internal_name){ toast('שם העסק הוא שדה חובה'); return; }

  let error;
  if (bizId){
    ({ error } = await window.supabaseClient.from('businesses').update(payload).eq('id', bizId));
  } else {
    payload.created_by = CURRENT_PROFILE ? CURRENT_PROFILE.id : null;
    ({ error } = await window.supabaseClient.from('businesses').insert(payload));
  }
  if (error){ toast('שגיאה בשמירה: ' + error.message); return; }
  toast('נשמר בהצלחה');
  closeModal();
  await loadBusinesses();
}

function sendAgreementForBiz(id){
  const b = ALL_BIZ.find(x=>x.id===id);
  if (!b){ toast('עסק לא נמצא'); return; }
  const params = new URLSearchParams({
    type: 'seller',
    name: b.owner_name || '',
    phone: b.owner_phone || '',
    biz: b.internal_name || ''
  });
  window.open('https://baruchezon.github.io/bsd-contracts/bsd-admin-prep.html?' + params.toString(), '_blank');
}

async function deleteBiz(id){
  if (!confirm('למחוק עסק זה? הפעולה בלתי הפיכה.')) return;
  const { error } = await window.supabaseClient.from('businesses').delete().eq('id', id);
  if (error){ toast('אין הרשאה למחוק, או שגיאה: ' + error.message); return; }
  toast('נמחק בהצלחה');
  await loadBusinesses();
}

(async function init(){
  CURRENT_PROFILE = await requireAuth();
  if (!CURRENT_PROFILE) return;
  await loadLookups();
  document.getElementById('headerUserInfo').textContent = ((CURRENT_PROFILE.full_name && CURRENT_PROFILE.full_name.trim()) ? CURRENT_PROFILE.full_name : CURRENT_PROFILE.email) + ' · ' + new Date().toLocaleDateString('he-IL');
  if (CURRENT_PROFILE.role !== 'admin'){ const navUsers = document.getElementById('navUsersLink'); if (navUsers) navUsers.style.display = 'none'; }
  await loadBusinesses();
})();
</script>
